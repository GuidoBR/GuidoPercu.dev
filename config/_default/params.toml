# -- Theme Options -- https://blowfish.page/docs/configuration/
colorScheme = "blowfish"
defaultAppearance = "dark"      # site previously defaulted to dark
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true

# Recent posts + "Posts" listings come from this section only
# (otherwise Blowfish picks the largest section, which is the library).
mainSections = ["posts"]

fingerprintAlgorithm = "sha512"

[header]
  layout = "fixed"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "custom"             # see layouts/partials/home/custom.html
  showRecent = true
  showRecentItems = 6
  showMoreLink = true
  showMoreLinkDest = "/posts/"
  cardView = true

[article]
  showDate = true
  showAuthor = true
  showBreadcrumbs = true
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showWordCount = false
  showPagination = true
  showHero = false

[list]
  showHero = false
  showBreadcrumbs = true
  groupByYear = true
  cardView = true
  cardViewScreenWidth = false

[taxonomy]
  showTermCount = true

[sitemap]
  excludedKinds = []
