# Required by Blowfish. unsafe = true keeps the custom `rawhtml` shortcode
# (used ~39x across the library content) rendering its inline HTML/CSS.
[goldmark]
  [goldmark.parser]
    wrapStandAloneImageWithinParagraph = false
    [goldmark.parser.attribute]
      block = true
  [goldmark.renderer]
    unsafe = true

[highlight]
  noClasses = false

[tableOfContents]
  startLevel = 2
  endLevel = 4
